services:
  - type: web
    name: project-backend
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: career_db
      - key: APP_ADMIN_EMAIL
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://lokesh15kl.github.io
      - key: SESSION_COOKIE_SAME_SITE
        value: None
      - key: SESSION_COOKIE_SECURE
        value: true
