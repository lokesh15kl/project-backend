<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Data Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button.danger {
            background: #ff6b6b;
            margin-top: 10px;
        }
        
        button.danger:hover {
            background: #ee5a52;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-row.full {
            grid-template-columns: 1fr;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table thead {
            background: #f8f9fa;
        }
        
        table th {
            padding: 15px;
            text-align: left;
            color: #333;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
        }
        
        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        
        table tbody tr:hover {
            background: #f8f9fa;
        }
        
        .edit-btn {
            background: #51cf66;
            padding: 8px 12px;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .edit-btn:hover {
            background: #40c057;
        }
        
        .delete-btn {
            background: #ff6b6b;
            padding: 8px 12px;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #ee5a52;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .stat-card p {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Backend Data Manager</h1>
        
        <div id="message" class="message"></div>
        
        <div class="stats">
            <div class="stat-card">
                <h3 id="totalUsers">0</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3 id="adminUsers">0</h3>
                <p>Admin Users</p>
            </div>
            <div class="stat-card">
                <h3 id="regularUsers">0</h3>
                <p>Regular Users</p>
            </div>
        </div>
        
        <!-- Add New User Section -->
        <div class="section">
            <h2>➕ Add New User</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="newName" placeholder="Enter user name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="newEmail" placeholder="Enter user email">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="newPassword" placeholder="Enter user password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="newRole">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
            </div>
            <button onclick="addUser()">Add User</button>
        </div>
        
        <!-- Users List Section -->
        <div class="section">
            <h2>👥 All Users</h2>
            <div id="usersContainer" class="loading">Loading users...</div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit User</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="editName" placeholder="User name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" placeholder="User email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="editPassword" placeholder="Leave blank to keep current">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="editRole">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button onclick="closeEditModal()">Cancel</button>
                <button onclick="saveUser()">Save Changes</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        let editingUserId = null;
        
        // Load users on page load
        document.addEventListener('DOMContentLoaded', loadUsers);
        
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/api/users`);
                const users = await response.json();
                displayUsers(users);
                updateStats(users);
            } catch (error) {
                showMessage('Error loading users: ' + error.message, 'error');
            }
        }
        
        function displayUsers(users) {
            const container = document.getElementById('usersContainer');
            
            if (users.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">No users found</p>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            users.forEach((user, index) => {
                const createdAt = new Date(user.createdAt).toLocaleString();
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${escapeHtml(user.name)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td><strong>${user.role}</strong></td>
                        <td>${createdAt}</td>
                        <td>
                            <button class="edit-btn" onclick="openEditModal('${user.id}', '${escapeHtml(user.name)}', '${escapeHtml(user.email)}', '${user.role}')">Edit</button>
                            <button class="delete-btn" onclick="deleteUser('${user.id}')">Delete</button>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            container.innerHTML = html;
        }
        
        function updateStats(users) {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('adminUsers').textContent = users.filter(u => u.role === 'ADMIN').length;
            document.getElementById('regularUsers').textContent = users.filter(u => u.role === 'USER').length;
        }
        
        async function addUser() {
            const name = document.getElementById('newName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            const role = document.getElementById('newRole').value;
            
            if (!name || !email || !password) {
                showMessage('Please fill in all fields (name, email, password)', 'error');
                return;
            }
            
            try {
                const payload = { name, email, password, role };
                console.log('Adding user with payload:', payload);
                
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    credentials: 'include'
                });
                
                const responseText = await response.text();
                console.log('Register response status:', response.status, 'body:', responseText);
                
                if (response.ok) {
                    showMessage('User added successfully!', 'success');
                    document.getElementById('newName').value = '';
                    document.getElementById('newEmail').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('newRole').value = 'USER';
                    setTimeout(loadUsers, 500);
                } else {
                    try {
                        const error = JSON.parse(responseText);
                        showMessage('Error: ' + (error.message || responseText), 'error');
                    } catch {
                        showMessage('Error adding user: (' + response.status + ') ' + responseText, 'error');
                    }
                }
            } catch (error) {
                console.error('Add user error:', error);
                showMessage('Network error: ' + error.message, 'error');
            }
        }
        
        function openEditModal(id, name, email, role) {
            editingUserId = id;
            document.getElementById('editName').value = name;
            document.getElementById('editEmail').value = email;
            document.getElementById('editPassword').value = '';
            document.getElementById('editRole').value = role;
            document.getElementById('editModal').classList.add('show');
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingUserId = null;
        }
        
        async function saveUser() {
            const name = document.getElementById('editName').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            const password = document.getElementById('editPassword').value.trim();
            const role = document.getElementById('editRole').value;
            
            if (!name || !email) {
                showMessage('Name and email are required', 'error');
                return;
            }
            
            try {
                const payload = { name, email, role };
                if (password) payload.password = password;
                
                console.log('Updating user', editingUserId, 'with payload:', payload);
                
                const response = await fetch(`${API_BASE}/api/users/${editingUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    credentials: 'include'
                });
                
                const responseText = await response.text();
                console.log('Update response status:', response.status, 'body:', responseText);
                
                if (response.ok) {
                    showMessage('User updated successfully!', 'success');
                    closeEditModal();
                    setTimeout(loadUsers, 500);
                } else {
                    try {
                        const error = JSON.parse(responseText);
                        showMessage('Error: ' + (error.message || responseText), 'error');
                    } catch {
                        showMessage('Error updating user: (' + response.status + ') ' + responseText, 'error');
                    }
                }
            } catch (error) {
                console.error('Save user error:', error);
                showMessage('Network error: ' + error.message, 'error');
            }
        }
        
        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include'
                });
                
                const responseText = await response.text();
                console.log('Delete response status:', response.status, 'body:', responseText);
                
                if (response.ok) {
                    showMessage('User deleted successfully!', 'success');
                    setTimeout(loadUsers, 500);
                } else {
                    try {
                        const error = JSON.parse(responseText);
                        showMessage('Error: ' + (error.message || responseText), 'error');
                    } catch {
                        showMessage('Error deleting user: (' + response.status + ') ' + responseText, 'error');
                    }
                }
            } catch (error) {
                console.error('Delete user error:', error);
                showMessage('Network error: ' + error.message, 'error');
            }
        }
        
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 5000);
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
