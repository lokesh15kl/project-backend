<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        body {
            display: block;
            min-height: 100vh;
            margin: 0;
            padding: 28px 16px;
            background: linear-gradient(140deg, #edf4ff, #f6fbff);
        }

        .container {
            width: min(1100px, 96vw);
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            border: 1px solid #e3ebfa;
            box-shadow: 0 22px 55px rgba(17, 38, 85, 0.14);
            padding: 30px;
            text-align: left;
        }

        .page-header {
            text-align: center;
            margin-top: 12px;
        }

        .page-header h2 {
            margin-bottom: 8px;
            color: #1f3558;
            font-size: 34px;
        }

        .page-header p {
            margin-bottom: 0;
            color: #5c6f8a;
            font-size: 16px;
        }

        /* ===== TOP NAV ===== */
        .admin-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .admin-tabs a {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #6f45d2, #5434b3);
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 14px;
        }

        .admin-tabs a:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(83, 52, 179, 0.35);
        }

        /* ===== QUIZ BOXES ===== */
        .quiz-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-top: 24px;
        }

        .quiz-box {
            min-height: 106px;
            background: linear-gradient(135deg, #30b865, #22a557);
            border-radius: 14px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            padding: 10px;
            text-align: center;
        }

        .quiz-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(21, 112, 57, 0.28);
        }

        /* ===== AI SECTION ===== */
        .ai-section {
            text-align: center;
            margin-top: 26px;
            background: #f5f8ff;
            border: 1px solid #dee8ff;
            border-radius: 14px;
            padding: 18px;
        }

        .ai-btn {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #6f45d2, #5434b3);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .ai-btn:hover {
            box-shadow: 0 8px 20px rgba(83, 52, 179, 0.35);
        }

        /* ===== ADMIN MANAGEMENT ===== */
        .admin-management {
            text-align: center;
            margin-top: 16px;
            background: #fff8ee;
            border: 1px solid #ffe2b8;
            border-radius: 14px;
            padding: 18px;
        }

        .admin-btn {
            display: inline-block;
            padding: 11px 20px;
            font-size: 15px;
            background: linear-gradient(135deg, #ffad32, #f28a00);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
        }

        .admin-btn:hover {
            box-shadow: 0 8px 20px rgba(220, 130, 0, 0.34);
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }

            .page-header h2 {
                font-size: 28px;
            }

            .quiz-box {
                min-height: 90px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 🔝 ADMIN NAVIGATION -->
    <div class="admin-tabs">
        <a href="/adminDashboard">Overview</a>
        <a href="/admin/assessments">Assessments</a>
        <a href="/admin/careers">Careers</a>
        <a href="/viewScores">Student Results</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="page-header">
        <h2>Admin Dashboard 👨‍💼</h2>
        <p>Create and manage quizzes with one central control panel</p>
    </div>

    <!-- 🧩 MANUAL QUIZ CATEGORIES -->
    <div class="quiz-container">
        <a href="/admin/manualQuiz?category=Personality" class="quiz-box">Personality</a>
        <a href="/admin/manualQuiz?category=Aptitude" class="quiz-box">Aptitude</a>
        <a href="/admin/manualQuiz?category=Technical" class="quiz-box">Technical</a>
        <a href="/admin/manualQuiz?category=Logical" class="quiz-box">Logical</a>
        <a href="/admin/manualQuiz?category=Career" class="quiz-box">Career Interest</a>
    </div>

    <p th:if="${msg}" class="success-msg" th:text="${msg}"></p>

    <!-- 🤖 AI QUIZ GENERATOR -->
    <div class="ai-section">
        <h3>AI Quiz Generator 🤖</h3>
        <a href="/generate-quiz">
            <button class="ai-btn">Generate Quiz using ChatGPT</button>
        </a>
    </div>

    <!-- 👤 ADMIN MANAGEMENT (THIS WAS MISSING) -->
    <div class="admin-management"
         th:if="${session.loggedUser != null and session.loggedUser.role == 'ADMIN'}">

        <h3>User Management 👤</h3>
        <a href="/makeAdmin" class="admin-btn">Make / Remove Admin</a>
    </div>

</div>

</body>
</html>
