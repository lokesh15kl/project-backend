<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Generate Quiz using AI (Admin)</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h2 style="text-align:center;">Generate Quiz using AI 🤖 (Admin)</h2>

    <form action="/admin/generateQuizAI" method="post">

        <label>Quiz Component</label>
		<select name="category" required>
		    <option value="">-- Select Section --</option>

		    <option th:each="c : ${categories}"
		            th:value="${c.name}"
		            th:text="${c.name}">
		    </option>
		</select>

        <label>Quiz Name</label>
        <input type="text" name="quizTitle" required>

        <label>Difficulty</label>
        <select name="difficulty" required>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
        </select>

        <label>No. of Questions</label>
        <input type="number" name="count" min="1" max="10" value="5" required>

        <br><br>
        <button type="submit">Generate</button>
    </form>

    <br>
    <a href="/adminDashboard">⬅ Back</a>
</div>

</body>
</html>
