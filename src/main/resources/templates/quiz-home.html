<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Choose Quiz</title>
    <link rel="stylesheet" href="/css/quiz-home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <h1>Choose a Quiz</h1>

    <div class="quiz-grid">

        <a th:href="@{/startQuiz(category='Personality')}" class="quiz-card">
            <i class="fas fa-brain"></i>
            <h3>Personality Quiz</h3>
        </a>

        <a th:href="@{/startQuiz(category='Aptitude')}" class="quiz-card">
            <i class="fas fa-calculator"></i>
            <h3>Aptitude Quiz</h3>
        </a>

        <a th:href="@{/startQuiz(category='Technical')}" class="quiz-card">
            <i class="fas fa-laptop-code"></i>
            <h3>Technical Quiz</h3>
        </a>

        <a th:href="@{/startQuiz(category='Logical')}" class="quiz-card">
            <i class="fas fa-puzzle-piece"></i>
            <h3>Logical Reasoning</h3>
        </a>

    </div>
</div>

</body>
</html>
