<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        .login-box {
            max-width: 420px;
            margin: 80px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 5px;
        }

        .login-box p {
            color: #666;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .captcha-box {
            margin-top: 20px;
            padding: 12px;
            background: #f4f4f4;
            border: 2px dashed #6a1b9a;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 6px;
            user-select: none;
        }

        .login-box button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            background: #6a1b9a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #4a148c;
        }

        .error-text {
            color: red;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .link {
            display: inline-block;
            margin-top: 18px;
            color: #6a1b9a;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login</h2>
    <p>Enter your credentials to continue</p>

    <!-- ERROR MESSAGE -->
    <p class="error-text" th:if="${error}" th:text="${error}"></p>
    <p class="error-text" th:if="${captchaError}" th:text="${captchaError}"></p>

    <form action="/doLogin" method="post">

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <!-- CAPTCHA DISPLAY -->
        <div class="captcha-box">
            <span th:text="${captchaText}"></span>
        </div>

        <!-- CAPTCHA INPUT -->
        <input type="text"
               name="captcha"
               placeholder="Enter captcha shown above"
               required>

        <button type="submit">Login</button>
    </form>

    <a class="link" href="/">Back to Home</a>

</div>

</body>
</html>
