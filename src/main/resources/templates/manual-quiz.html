<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Question (Manual)</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

    <h2>Add Question (Manual)</h2>

    <form action="/admin/saveManualQuiz" method="post">

        <!-- ✅ COMPONENT / CATEGORY -->
        <label>Quiz Component</label>
        <select name="category" required>
            <option value="">-- Select Component --</option>
            <option value="Personality" th:selected="${category=='Personality'}">Personality</option>
            <option value="Aptitude" th:selected="${category=='Aptitude'}">Aptitude</option>
            <option value="Technical" th:selected="${category=='Technical'}">Technical</option>
            <option value="Logical" th:selected="${category=='Logical'}">Logical</option>
            <option value="Career" th:selected="${category=='Career'}">Career</option>
        </select>

        <label>Quiz Name</label>
        <input type="text" name="quizTitle"
               placeholder="Quiz 1 / Java Basics"
               required>

        <label>Question</label>
        <input type="text" name="question" required>

        <label>Option 1</label>
        <input type="text" name="option1" required>

        <label>Option 2</label>
        <input type="text" name="option2" required>

        <label>Option 3</label>
        <input type="text" name="option3" required>

        <label>Option 4</label>
        <input type="text" name="option4" required>

        <label>Correct Answer</label>
        <input type="text" name="answer" required>

        <br><br>
        <button type="submit">Save Question</button>
    </form>

    <br>
    <a href="/adminDashboard">⬅ Back</a>

</div>

</body>
</html>
