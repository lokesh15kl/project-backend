spring.application.name=full-project
server.port=${PORT:8080}
spring.config.import=optional:file:.env.local[.properties]

# DATABASE CONFIG (MONGODB)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/career_db}
spring.data.mongodb.database=${MONGODB_DATABASE:career_db}

# SMTP (GMAIL OTP DELIVERY)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

# OTP SECURITY POLICY
app.otp.expiry-seconds=${OTP_EXPIRY_SECONDS:300}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,https://lokesh15kl.github.io}

server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# HUGGINGFACE AI SERVICE
huggingface.api.key=${HUGGINGFACE_API_KEY:}